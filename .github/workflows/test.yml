name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run unit suite (broker tests deselected; no Docker)
        run: uv run --python ${{ matrix.python-version }} pytest -m "not integration"

  coverage:
    # Owns the coverage badge AND the broker-backed integration run. The full
    # suite runs against a real Redpanda broker that testcontainers spins up, so
    # the integration paths contribute to coverage — not just the mocked unit
    # tests. Single-version on purpose: exactly one job writes the data branch,
    # so the parallel legs don't race. testcontainers needs Docker, which the
    # ubuntu-latest runner provides out of the box. python-coverage-comment-action
    # commits the badge + coverage data to its own data branch on pushes to main
    # and posts the coverage comment on same-repo PRs; the companion
    # coverage.yml posts it for fork / Dependabot PRs.
    runs-on: ubuntu-latest
    # Elevated for THIS job only (the workflow default is `contents: read`).
    permissions:
      contents: write       # commit badge + data to the data branch
      pull-requests: write  # post / update the coverage comment
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run full suite with coverage (Redpanda via testcontainers)
        # Coverage config lives in pyproject.toml ([tool.coverage.run]); this
        # writes the .coverage file the action consumes below.
        run: uv run --python 3.12 pytest -q --cov --cov-report=term-missing
      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          # Thresholds set badge colour only; they do NOT gate CI.
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 70
      - name: Store coverage comment (for fork / Dependabot PRs)
        uses: actions/upload-artifact@v4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

  floor:
    # Verify the declared runtime floor actually works: pin aiokafka to the
    # lowest version pyproject allows (keep this in sync with the >= in
    # pyproject.toml) while test tooling resolves current, and run the full
    # broker-backed suite on the NEWEST Python — the corner most likely to lack
    # wheels for an old dependency. This closes the "verified-vs-shipped" gap.
    # testcontainers spins up Redpanda (Docker is provided by the runner).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run full suite against the aiokafka floor
        run: uv run --python 3.13 --with 'aiokafka==0.13.0' pytest
