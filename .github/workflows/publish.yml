name: Publish to PyPI

# Manual fallback / re-publish path. Automatic publishing on each release is
# chained inside release-please.yml (GITHUB_TOKEN-created releases cannot
# trigger `on: release` here). Run with the tag to publish, e.g. v0.1.0.
#
# These steps are deliberately inline (and duplicated in release-please.yml):
# pypa/gh-action-pypi-publish is a Docker action and cannot be nested inside a
# local composite action — doing so makes it resolve its image as
# ghcr.io/<this-repo>:<ref> and fail with "denied".

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

# Least-privilege default; the pypi job opts into the one token scope it needs.
permissions: {}

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ktables/
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: astral-sh/setup-uv@v7
      - name: Build sdist and wheel
        run: uv build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
