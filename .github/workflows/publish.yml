name: Publish to PyPI

# Manual fallback / re-publish path. Automatic publishing on each release is
# chained inside release-please.yml (GITHUB_TOKEN-created releases cannot
# trigger `on: release` here). Run with the tag to publish, e.g. v0.1.0. The
# build/publish steps are shared with release-please via .github/actions/publish.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

# Least-privilege default; the pypi job opts into the one token scope it needs.
permissions: {}

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ktables/
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6  # make the local composite action available
      - uses: ./.github/actions/publish
        with:
          tag: ${{ inputs.tag }}
