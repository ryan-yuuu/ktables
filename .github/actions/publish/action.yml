name: Build and publish to PyPI
description: >-
  Build the sdist + wheel at a given tag and publish to PyPI via OIDC trusted
  publishing. Shared by the manual publish workflow and the release-please chain
  so the build/publish steps live in one place. The calling job must grant
  `id-token: write` and set the `pypi` environment, and must check out the repo
  first (a local action is only available once the repo is in the workspace —
  the action logic then comes from the default ref, and the `tag` checkout below
  supplies the code to build, so this works for any tag).

inputs:
  tag:
    description: Release tag whose code is built and published (e.g. v0.1.0).
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag }}
    - uses: astral-sh/setup-uv@v7
    - name: Build sdist and wheel
      run: uv build
      shell: bash
    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
